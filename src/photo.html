<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Gram · Photo</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,ital,wght@9..144,0,400..900;9..144,1,400..900&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --paper: #f6f1e7;
                --paper-deep: #ebe4d3;
                --canvas-paper: #fffdf6;
                --ink: #1a1714;
                --ink-soft: #544c43;
                --ink-faint: #a89c8a;
                --rule: #d8cfb9;
                --accent: #c0392f;
                --serif: "Fraunces", "Times New Roman", serif;
                --mono: "JetBrains Mono", ui-monospace, monospace;
            }
            * { box-sizing: border-box; }
            html, body { margin: 0; padding: 0; height: 100%; }
            body {
                background-color: var(--paper);
                background-image: radial-gradient(var(--rule) 1px, transparent 1px);
                background-size: 14px 14px;
                color: var(--ink);
                font-family: var(--mono);
                font-size: 12px;
                min-height: 100%;
            }
            button { font-family: inherit; }

            .topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                padding: 18px 28px;
                background: var(--paper);
                border-bottom: 1px solid var(--rule);
            }
            .brand {
                display: flex; align-items: center; gap: 14px;
                min-width: 0; flex: 1 1 auto;
            }
            .logo {
                width: 28px; height: 28px; border-radius: 6px;
                background: var(--ink); color: var(--paper);
                font-family: var(--serif);
                font-weight: 700; font-style: italic;
                font-size: 17px; line-height: 1; padding-bottom: 2px;
                display: flex; align-items: center; justify-content: center;
                flex: 0 0 auto;
            }
            .brand-text {
                font-family: var(--serif); font-weight: 600;
                font-size: 20px; letter-spacing: -0.01em;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            }
            .brand-sub { color: var(--ink-faint); font-style: italic; font-weight: 400; }
            .topbar-right { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
            .mode-nav {
                display: flex; align-items: center; gap: 2px; padding: 3px;
                background: var(--paper-deep); border: 1px solid var(--rule);
                border-radius: 999px;
            }
            .mode-btn {
                padding: 7px 18px;
                background: transparent; color: var(--ink-soft);
                border: none; border-radius: 999px; cursor: pointer;
                font-family: var(--mono); font-size: 11px;
                letter-spacing: 0.16em; text-transform: uppercase;
                font-weight: 500; text-decoration: none;
                transition: all 0.12s;
            }
            .mode-btn.active { background: var(--ink); color: var(--paper); font-weight: 600; }

            .container {
                display: flex; flex-direction: column; align-items: center;
                max-width: 800px; width: 100%;
                margin: 0 auto;
                padding: 28px 20px 40px;
            }

            .label {
                font-size: 10px; letter-spacing: 0.2em;
                color: var(--ink-faint); text-transform: uppercase;
                margin-bottom: 6px; align-self: flex-start;
            }
            h1 {
                margin: 0 0 24px;
                font-family: var(--serif);
                font-style: italic; font-weight: 500;
                font-size: 28px; line-height: 1.05;
                color: var(--ink);
                align-self: flex-start;
            }

            .camera-container { position: relative; margin-bottom: 20px; }
            #video, #canvas {
                background: var(--canvas-paper);
                border-radius: 2px;
                border: 1px solid var(--rule);
                box-shadow:
                    0 1px 0 rgba(0,0,0,0.04),
                    0 16px 28px -16px rgba(40,30,20,0.18);
                max-width: 100%;
                height: auto;
                display: block;
            }
            #canvas { display: none; }
            .camera-switch {
                position: absolute;
                top: 10px; right: 10px;
                background: rgba(20,16,12,0.65);
                border: 1px solid rgba(255,255,255,0.15);
                border-radius: 999px;
                width: 44px; height: 44px;
                display: flex; align-items: center; justify-content: center;
                cursor: pointer; z-index: 10;
                transition: all 0.12s;
            }
            .camera-switch:hover { background: rgba(20,16,12,0.85); }
            .camera-switch svg { width: 22px; height: 22px; fill: var(--paper); }
            .camera-switch.hidden { display: none !important; }

            .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
            #captureBtn {
                display: flex; align-items: center; gap: 10px;
                padding: 12px 22px;
                background: var(--ink); color: var(--paper);
                border: 1px solid var(--ink); border-radius: 6px;
                font-family: var(--mono); font-size: 11px;
                letter-spacing: 0.18em; text-transform: uppercase;
                cursor: pointer; font-weight: 500;
            }
            #captureBtn:disabled { opacity: 0.5; cursor: not-allowed; }
            #captureBtn svg { width: 14px; height: 14px; }

            .message {
                margin-bottom: 20px; padding: 12px 16px;
                border-radius: 6px; width: 100%;
                text-align: center; box-sizing: border-box;
                font-family: var(--mono); font-size: 11px;
                letter-spacing: 0.12em; text-transform: uppercase;
                display: none;
            }
            .success {
                background: var(--canvas-paper); color: var(--ink);
                border: 1px solid var(--rule);
            }
            .error {
                background: rgba(192, 57, 47, 0.92); color: var(--paper);
            }
            .camera-error {
                background: rgba(192, 57, 47, 0.13); color: var(--ink);
                border: 1px solid rgba(192, 57, 47, 0.25);
            }
            .hidden { display: none !important; }
            .countdown-overlay {
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(20,16,12,0.55);
                backdrop-filter: blur(2px);
                -webkit-backdrop-filter: blur(2px);
                display: none;
                align-items: center; justify-content: center;
                font-family: var(--serif);
                font-style: italic; font-weight: 700;
                font-size: 140px; line-height: 1;
                color: var(--paper);
                z-index: 20;
                border-radius: 2px;
            }
        </style>
    </head>
    <body>
        <header class="topbar">
            <div class="brand">
                <div class="logo">g</div>
                <span class="brand-text">gram<span class="brand-sub"> · receipt lab</span></span>
            </div>
            <div class="topbar-right">
                <nav class="mode-nav">
                    <a href="/" class="mode-btn">Draw</a>
                    <a href="/photo/" class="mode-btn active">Photo</a>
                </nav>
            </div>
        </header>

        <div class="container">
            <div class="label">prompt</div>
            <h1>capture a moment</h1>

            <div id="successMessage" class="message success">
                Sent to printer
            </div>
            <div id="errorMessage" class="message error">
                Failed to send. Please try again.
            </div>
            <div id="cameraError" class="message camera-error">
                Unable to access camera. Please check permissions.
            </div>

            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
                <div id="countdownOverlay" class="countdown-overlay">3</div>
                <button id="cameraSwitchBtn" class="camera-switch" title="Switch camera">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 4l4 4-4 4v-2c-3.31 0-6 2.69-6 6s2.69 6 6 6v2c-4.42 0-8-3.58-8-8s3.58-8 8-8V4z"/>
                        <path d="M8 20l-4-4 4-4v2c3.31 0 6-2.69 6-6s-2.69-6-6-6v-2c4.42 0 8 3.58 8 8s-3.58 8-8 8v-2z"/>
                    </svg>
                </button>
            </div>

            <div class="controls">
                <button id="captureBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9V3h12v6"/>
                        <rect x="3" y="9" width="18" height="9" rx="1"/>
                        <rect x="6" y="14" width="12" height="7"/>
                        <circle cx="17" cy="12" r=".6" fill="currentColor"/>
                    </svg>
                    Capture &amp; print
                </button>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const video = document.getElementById("video");
                const canvas = document.getElementById("canvas");
                const ctx = canvas.getContext("2d");
                const captureBtn = document.getElementById("captureBtn");
                const successMessage = document.getElementById("successMessage");
                const errorMessage = document.getElementById("errorMessage");
                const cameraError = document.getElementById("cameraError");
                const cameraSwitchBtn = document.getElementById("cameraSwitchBtn");
                const countdownOverlay = document.getElementById("countdownOverlay");

                let stream = null;
                let photoTaken = false;
                let currentFacingMode = 'environment';
                let cameras = [];
                let countdownTimer = null;
                let isCapturing = false;

                function adjustVideoDimensions() {
                    const videoWidth = video.videoWidth;
                    const videoHeight = video.videoHeight;
                    const aspectRatio = videoWidth / videoHeight;
                    const maxWidth = 576;
                    const containerWidth = Math.min(maxWidth, window.innerWidth - 40);
                    const displayWidth = containerWidth;
                    const displayHeight = containerWidth / aspectRatio;
                    video.style.width = displayWidth + 'px';
                    video.style.height = displayHeight + 'px';
                    canvas.width = videoWidth;
                    canvas.height = videoHeight;
                    canvas.style.width = displayWidth + 'px';
                    canvas.style.height = displayHeight + 'px';
                }

                async function getCameras() {
                    try {
                        const devices = await navigator.mediaDevices.enumerateDevices();
                        cameras = devices.filter(device => device.kind === 'videoinput');
                        if (cameras.length > 1) {
                            cameraSwitchBtn.classList.remove('hidden');
                        } else {
                            cameraSwitchBtn.classList.add('hidden');
                        }
                    } catch (err) {
                        console.error("Error getting cameras:", err);
                        cameraSwitchBtn.classList.add('hidden');
                    }
                }

                async function initCamera(facingMode = currentFacingMode) {
                    try {
                        if (stream) stream.getTracks().forEach(t => t.stop());
                        const constraints = {
                            video: {
                                width: { ideal: 1920 },
                                height: { ideal: 1080 },
                                facingMode: facingMode
                            }
                        };
                        stream = await navigator.mediaDevices.getUserMedia(constraints);
                        video.srcObject = stream;
                        currentFacingMode = facingMode;
                        video.addEventListener('loadedmetadata', adjustVideoDimensions);
                    } catch (err) {
                        console.error("Error accessing camera:", err);
                        cameraError.style.display = "block";
                    }
                }

                async function switchCamera() {
                    const newFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
                    await initCamera(newFacingMode);
                }

                function startCountdownCapture() {
                    if (isCapturing) return;
                    isCapturing = true;
                    captureBtn.disabled = true;
                    cameraSwitchBtn.classList.add('hidden');

                    let countdown = 3;
                    countdownOverlay.textContent = countdown;
                    countdownOverlay.style.display = "flex";

                    countdownTimer = setInterval(() => {
                        countdown--;
                        if (countdown > 0) {
                            countdownOverlay.textContent = countdown;
                        } else {
                            clearInterval(countdownTimer);
                            countdownOverlay.style.display = "none";
                            captureAndSubmitPhoto();
                        }
                    }, 1000);
                }

                function captureAndSubmitPhoto() {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    video.style.display = "none";
                    canvas.style.display = "block";
                    photoTaken = true;
                    submitPhoto();
                }

                function returnToCameraView() {
                    video.style.display = "block";
                    canvas.style.display = "none";
                    captureBtn.disabled = false;
                    if (cameras.length > 1) cameraSwitchBtn.classList.remove('hidden');
                    successMessage.style.display = "none";
                    errorMessage.style.display = "none";
                    photoTaken = false;
                    isCapturing = false;
                }

                function submitPhoto() {
                    if (!photoTaken) return;
                    canvas.toBlob(function (blob) {
                        const formData = new FormData();
                        formData.append("image", blob, "photo.png");
                        fetch("/gram/?description=false&rotate_if_landscape=true", {
                            method: "POST",
                            body: formData,
                        })
                            .then((response) => {
                                successMessage.style.display = "none";
                                errorMessage.style.display = "none";
                                if (response.status === 201) {
                                    successMessage.style.display = "block";
                                    returnToCameraView();
                                    setTimeout(() => { successMessage.style.display = "none"; }, 3000);
                                } else {
                                    errorMessage.style.display = "block";
                                    setTimeout(() => {
                                        returnToCameraView();
                                        errorMessage.style.display = "none";
                                    }, 3000);
                                }
                            })
                            .catch((error) => {
                                console.error("Error submitting photo:", error);
                                errorMessage.style.display = "block";
                                setTimeout(() => {
                                    returnToCameraView();
                                    errorMessage.style.display = "none";
                                }, 3000);
                            });
                    }, "image/png");
                }

                captureBtn.addEventListener("click", startCountdownCapture);
                cameraSwitchBtn.addEventListener("click", switchCamera);

                getCameras().then(() => initCamera());

                window.addEventListener('orientationchange', () => {
                    setTimeout(() => {
                        if (video.videoWidth && video.videoHeight) {
                            adjustVideoDimensions();
                        }
                    }, 100);
                });

                window.addEventListener("beforeunload", function () {
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    if (countdownTimer) clearInterval(countdownTimer);
                });
            });
        </script>
    </body>
</html>
