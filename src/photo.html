<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Photo Capture App</title>
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans",
                    "Helvetica Neue", sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                padding: 20px;
                background: linear-gradient(135deg, #fef9f0 0%, #f0e6ff 50%, #e6f0ff 100%);
                color: #2d2d3a;
            }
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                box-shadow: 0 1px 12px rgba(0, 0, 0, 0.08);
                padding: 12px 20px;
                display: flex;
                justify-content: center;
                gap: 8px;
                z-index: 1000;
            }
            .navbar a {
                text-decoration: none;
                color: #555;
                padding: 8px 20px;
                border-radius: 50px;
                transition: all 0.25s ease;
                font-weight: 500;
                font-size: 15px;
            }
            .navbar a:hover {
                background-color: rgba(107, 76, 230, 0.08);
                color: #6b4ce6;
            }
            .navbar a.active {
                background: linear-gradient(135deg, #6b4ce6, #8b5cf6);
                color: white;
                box-shadow: 0 2px 8px rgba(107, 76, 230, 0.35);
            }
            h1 {
                margin-bottom: 20px;
                font-weight: 700;
                margin-top: 70px;
                font-size: 28px;
                background: linear-gradient(135deg, #6b4ce6, #e6527a);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: -0.5px;
            }
            .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                max-width: 800px;
                width: 100%;
            }
            .camera-container {
                position: relative;
                margin-bottom: 20px;
            }
            .camera-switch {
                position: absolute;
                top: 10px;
                right: 10px;
                background-color: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 50%;
                width: 50px;
                height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.25s ease;
                z-index: 10;
            }
            .camera-switch:hover {
                background-color: rgba(0, 0, 0, 0.6);
                transform: scale(1.08);
            }
            .camera-switch svg {
                width: 24px;
                height: 24px;
                fill: white;
            }
            .camera-switch.hidden {
                display: none !important;
            }
            #video,
            #canvas {
                background-color: white;
                border-radius: 16px;
                box-shadow:
                    0 8px 32px rgba(107, 76, 230, 0.1),
                    0 2px 8px rgba(0, 0, 0, 0.05);
                max-width: 100%;
                height: auto;
                border: 1px solid rgba(107, 76, 230, 0.08);
            }
            #canvas {
                display: none;
            }
            .controls {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
                justify-content: center;
            }
            button {
                padding: 10px 20px;
                border-radius: 12px;
                font-size: 16px;
                cursor: pointer;
                transition: all 0.25s ease;
                font-weight: 600;
                border: none;
            }
            #captureBtn {
                background: linear-gradient(135deg, #6b4ce6, #8b5cf6);
                color: white;
                box-shadow: 0 4px 14px rgba(107, 76, 230, 0.35);
                padding: 12px 28px;
            }
            #captureBtn:hover {
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(107, 76, 230, 0.45);
            }
            .message {
                margin-bottom: 20px;
                padding: 15px;
                border-radius: 12px;
                width: 100%;
                text-align: center;
                box-sizing: border-box;
                font-weight: 500;
            }
            .success {
                background: linear-gradient(135deg, #e6f7e6, #d4f5d4);
                color: #1a6b1e;
                display: none;
                border: 1px solid rgba(46, 125, 50, 0.15);
            }
            .error {
                background: linear-gradient(135deg, #ffebee, #ffd6da);
                color: #b71c1c;
                display: none;
                border: 1px solid rgba(198, 40, 40, 0.15);
            }
            .camera-error {
                background: linear-gradient(135deg, #fff8e1, #fff3cd);
                color: #7a5900;
                display: none;
                border: 1px solid rgba(133, 100, 4, 0.15);
            }
            .hidden {
                display: none !important;
            }
            .countdown-overlay {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(107, 76, 230, 0.4);
                backdrop-filter: blur(2px);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 120px;
                font-weight: 800;
                color: white;
                text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
                z-index: 20;
                border-radius: 16px;
                display: none;
            }
        </style>
    </head>
    <body>
        <nav class="navbar">
            <a href="/">Draw</a>
            <a href="/photo/" class="active">Photo</a>
        </nav>

        <div class="container">
            <h1>Take a Photo</h1>

            <div id="successMessage" class="message success">
                Thank you for submitting your photo!
            </div>
            <div id="errorMessage" class="message error">
                Failed to submit photo. Please try again.
            </div>
            <div id="cameraError" class="message camera-error">
                Unable to access camera. Please check permissions.
            </div>

            <div class="camera-container">
                <video id="video" autoplay></video>
                <canvas id="canvas"></canvas>
                <div id="countdownOverlay" class="countdown-overlay">3</div>
                <button id="cameraSwitchBtn" class="camera-switch">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 4l4 4-4 4v-2c-3.31 0-6 2.69-6 6s2.69 6 6 6v2c-4.42 0-8-3.58-8-8s3.58-8 8-8V4z"/>
                        <path d="M8 20l-4-4 4-4v2c3.31 0 6-2.69 6-6s-2.69-6-6-6v-2c4.42 0 8 3.58 8 8s-3.58 8-8 8v-2z"/>
                    </svg>
                </button>



            <div class="controls">
                <button id="captureBtn">Capture Photo</button>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const video = document.getElementById("video");
                const canvas = document.getElementById("canvas");
                const ctx = canvas.getContext("2d");
                const captureBtn = document.getElementById("captureBtn");
                const successMessage =
                    document.getElementById("successMessage");
                const errorMessage = document.getElementById("errorMessage");
                const cameraError = document.getElementById("cameraError");
                const cameraSwitchBtn = document.getElementById("cameraSwitchBtn");
                const countdownOverlay = document.getElementById("countdownOverlay");

                let stream = null;
                let photoTaken = false;
                let currentFacingMode = 'environment'; // 'user' for front, 'environment' for back
                let cameras = [];
                let countdownTimer = null;
                let isCapturing = false;

                // Adjust video and canvas dimensions based on camera stream
                function adjustVideoDimensions() {
                    const videoWidth = video.videoWidth;
                    const videoHeight = video.videoHeight;

                    // Calculate aspect ratio
                    const aspectRatio = videoWidth / videoHeight;

                    // Set maximum width to 576px (target width for thermal printer)
                    const maxWidth = 576;
                    const containerWidth = Math.min(maxWidth, window.innerWidth - 40);

                    let displayWidth, displayHeight;

                    if (aspectRatio > 1) {
                        // Landscape: width-constrained
                        displayWidth = containerWidth;
                        displayHeight = containerWidth / aspectRatio;
                    } else {
                        // Portrait: height-constrained to maintain aspect ratio
                        displayWidth = containerWidth;
                        displayHeight = containerWidth / aspectRatio;
                    }

                    // Set video display dimensions
                    video.style.width = displayWidth + 'px';
                    video.style.height = displayHeight + 'px';

                    // Set canvas to match video's actual resolution for quality
                    canvas.width = videoWidth;
                    canvas.height = videoHeight;

                    // Set canvas display dimensions to match video
                    canvas.style.width = displayWidth + 'px';
                    canvas.style.height = displayHeight + 'px';
                }

                // Get available cameras
                async function getCameras() {
                    try {
                        const devices = await navigator.mediaDevices.enumerateDevices();
                        cameras = devices.filter(device => device.kind === 'videoinput');

                        // Show camera switch button only if multiple cameras are available
                        if (cameras.length > 1) {
                            cameraSwitchBtn.classList.remove('hidden');
                        } else {
                            cameraSwitchBtn.classList.add('hidden');
                        }
                    } catch (err) {
                        console.error("Error getting cameras:", err);
                        cameraSwitchBtn.classList.add('hidden');
                    }
                }

                // Initialize camera
                async function initCamera(facingMode = currentFacingMode) {
                    try {
                        // Stop existing stream if any
                        if (stream) {
                            stream.getTracks().forEach(track => track.stop());
                        }

                        const constraints = {
                            video: {
                                width: { ideal: 1920 },
                                height: { ideal: 1080 },
                                facingMode: facingMode
                            }
                        };

                        stream = await navigator.mediaDevices.getUserMedia(constraints);
                        video.srcObject = stream;
                        currentFacingMode = facingMode;

                        // Wait for video to load and adjust dimensions
                        video.addEventListener('loadedmetadata', () => {
                            adjustVideoDimensions();
                        });
                    } catch (err) {
                        console.error("Error accessing camera:", err);
                        cameraError.style.display = "block";
                    }
                }

                // Switch camera
                async function switchCamera() {
                    const newFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
                    await initCamera(newFacingMode);
                }

                // Start countdown and capture photo
                function startCountdownCapture() {
                    if (isCapturing) return;

                    isCapturing = true;
                    captureBtn.disabled = true;
                    captureBtn.style.opacity = "0.5";
                    cameraSwitchBtn.classList.add('hidden');

                    let countdown = 3;
                    countdownOverlay.textContent = countdown;
                    countdownOverlay.style.display = "flex";

                    countdownTimer = setInterval(() => {
                        countdown--;
                        if (countdown > 0) {
                            countdownOverlay.textContent = countdown;
                        } else {
                            clearInterval(countdownTimer);
                            countdownOverlay.style.display = "none";
                            captureAndSubmitPhoto();
                        }
                    }, 1000);
                }

                // Capture photo and auto-submit
                function captureAndSubmitPhoto() {
                    // Draw the video frame to canvas at full resolution
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Hide video, show canvas (frozen photo)
                    video.style.display = "none";
                    canvas.style.display = "block";

                    photoTaken = true;

                    // Auto-submit the photo
                    submitPhoto();
                }

                // Return to camera view
                function returnToCameraView() {
                    // Show video, hide canvas
                    video.style.display = "block";
                    canvas.style.display = "none";

                    // Reset button states
                    captureBtn.disabled = false;
                    captureBtn.style.opacity = "1";

                    // Show camera switch button if multiple cameras
                    if (cameras.length > 1) {
                        cameraSwitchBtn.classList.remove('hidden');
                    }

                    // Clear any messages
                    successMessage.style.display = "none";
                    errorMessage.style.display = "none";

                    photoTaken = false;
                    isCapturing = false;
                }

                // Submit photo
                function submitPhoto() {
                    if (!photoTaken) return;

                    // Convert canvas to blob
                    canvas.toBlob(function (blob) {
                        // Create form data
                        const formData = new FormData();
                        formData.append("image", blob, "photo.png");

                        // Submit photo
                        fetch("/gram/?description=false&rotate_if_landscape=true", {
                            method: "POST",
                            body: formData,
                        })
                            .then((response) => {
                                // Hide any previous messages
                                successMessage.style.display = "none";
                                errorMessage.style.display = "none";

                                if (response.status === 201) {
                                    // Show success message
                                    successMessage.style.display = "block";

                                    // Return to camera view
                                    returnToCameraView();

                                    // Hide success message after 3 seconds
                                    setTimeout(() => {
                                        successMessage.style.display = "none";
                                    }, 3000);
                                } else {
                                    // Show error message
                                    errorMessage.style.display = "block";

                                    // Return to camera view after showing error
                                    setTimeout(() => {
                                        returnToCameraView();
                                        errorMessage.style.display = "none";
                                    }, 3000);
                                }
                            })
                            .catch((error) => {
                                console.error("Error submitting photo:", error);

                                // Show error message
                                errorMessage.style.display = "block";

                                // Return to camera view after showing error
                                setTimeout(() => {
                                    returnToCameraView();
                                    errorMessage.style.display = "none";
                                }, 3000);
                            });
                    }, "image/png");
                }

                // Event listeners
                captureBtn.addEventListener("click", startCountdownCapture);
                cameraSwitchBtn.addEventListener("click", switchCamera);

                // Initialize camera on page load
                getCameras().then(() => initCamera());

                // Handle orientation changes
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => {
                        if (video.videoWidth && video.videoHeight) {
                            adjustVideoDimensions();
                        }
                    }, 100);
                });

                // Clean up camera stream and timers when page unloads
                window.addEventListener("beforeunload", function () {
                    if (stream) {
                        stream.getTracks().forEach((track) => track.stop());
                    }
                    if (countdownTimer) {
                        clearInterval(countdownTimer);
                    }
                });
            });
        </script>
    </body>
</html>
